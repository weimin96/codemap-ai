<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CodeAtlas logo</title>
  <desc id="desc">A geometric A shaped like a code atlas graph on a deep navy square.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080B36"/>
      <stop offset="0.52" stop-color="#0A0F4E"/>
      <stop offset="1" stop-color="#03051F"/>
    </linearGradient>
    <linearGradient id="line" x1="32" y1="24" x2="124" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#EEF0FF"/>
      <stop offset="1" stop-color="#8FA5FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="42" y1="116" x2="122" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.55 0 0 0 0 0.65 0 0 0 0 1 0 0 0 0.72 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="160" height="160" rx="28" fill="url(#bg)"/>
  <path d="M32 111C48 100 54 84 62 64C70 44 79 32 80 30C81 32 90 44 98 64C106 84 112 100 128 111" stroke="#26306A" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M30 122L80 32L130 122M50 86H110" stroke="url(#line)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M80 32V122M50 86L30 122M110 86L130 122" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.82"/>
  <circle cx="80" cy="32" r="6" fill="#F8FAFF" filter="url(#glow)"/>
  <circle cx="50" cy="86" r="5" fill="#5EEAD4"/>
  <circle cx="110" cy="86" r="5" fill="#8B5CF6"/>
  <circle cx="30" cy="122" r="5" fill="#F8FAFF"/>
  <circle cx="130" cy="122" r="5" fill="#F8FAFF"/>
  <path d="M44 48H34V36H56M116 36H128V48H118M34 112V124H46M126 112V124H114" stroke="#DDE3FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
