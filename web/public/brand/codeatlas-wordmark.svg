<svg width="660" height="96" viewBox="0 0 660 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CODEATLAS wordmark</title>
  <desc id="desc">A futuristic geometric wordmark spelling CODEATLAS in cold white strokes on a deep navy background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="660" y2="96" gradientUnits="userSpaceOnUse">
